# Logging configuration for Development profile
logging:
  level:
    root: INFO
    "[acm.internal.certification]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"

spring:
  datasource:
    url: jdbc:sqlite:certificate_dev.db
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
# Mail settings are inherited from application.yml to avoid credential overrides.
# Do NOT define spring.mail here unless you are using environment variables.
